<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aniyah Bunn Developer — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="./Home/Homepage.css"/>
  <link rel="stylesheet" href="./Skills/Skills.css"/>
  <link rel="stylesheet" href="./Experience/Experience.css"/>
  <link rel="stylesheet" href="./Projects/Projects.css"/>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="#home">Aniyah Software Engineer</a>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <div class="nav-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- SECTIONS -->
  <main>
    <div id="home"></div>
    <div id="skills"></div>
    <div id="experience"></div>
    <div id="projects"></div>
    <div id="contact"></div>
  </main>

  <script>
    // Fetch and inject section files
    async function loadSection(sectionId, fileName) {
      try {
        const response = await fetch(fileName);
        if (response.ok) {
          const html = await response.text();
          document.getElementById(sectionId).innerHTML = html;
        }
      } catch (error) {
        console.error(`Error loading ${fileName}:`, error);
      }
    }

  
    loadSection('home', './Home/Homepage.html');
    loadSection('skills', './Skills/Skills.html');
    loadSection('experience', './Experience/Experience.html');
    loadSection('projects', './Projects/Projects.html');
    // loadSection('contact', './Contact/Contact.html');

    // Theme toggle
    let isDark = true;
    function toggleTheme() {
      isDark = !isDark;
      document.documentElement.style.setProperty('--bg',      isDark ? '#0e0e0e' : '#f5f5f5');
      document.documentElement.style.setProperty('--surface', isDark ? '#1a1a1a' : '#e5e5e5');
      document.documentElement.style.setProperty('--border',  isDark ? '#2a2a2a' : '#ccc');
      document.documentElement.style.setProperty('--text',    isDark ? '#f0f0f0' : '#111');
      document.documentElement.style.setProperty('--muted',   isDark ? '#888'    : '#555');
      document.documentElement.style.setProperty('--white',   isDark ? '#ffffff' : '#111111');
    }
  </script>

</body>
</html>
