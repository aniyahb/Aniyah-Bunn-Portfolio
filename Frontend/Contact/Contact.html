<section class="contact" id="contact">

  <div class="section-header">
    <h2 class="section-title">Contact </h2>
    <p class="section-sub">I'm always open to discussing new projects, creative ideas or opportunities to be part of your vision.</p>
  </div>

  <div class="contact-layout">

    <!-- ── LEFT: Contact Info ── -->
    <div class="contact-info">

      <div class="contact-info-card">
        <span class="contact-info-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <div class="contact-info-text">
          <span class="contact-info-label">Email</span>
          <a href="mailto:aniyahcamile@gmail.com" class="contact-info-value">aniyahcamile@gmail.com</a>
        </div>
      </div>

      <div class="contact-info-card">
        <span class="contact-info-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.07 1.18 2 2 0 012.07 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </span>
        <div class="contact-info-text">
          <span class="contact-info-label">Phone</span>
          <a href="tel:+15551234567" class="contact-info-value">+1 (267) 342-4281</a>
        </div>
      </div>

      <div class="contact-info-card">
        <span class="contact-info-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1118 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </span>
        <div class="contact-info-text">
          <span class="contact-info-label">Location</span>
          <span class="contact-info-value">Philadelphia, PA</span>
        </div>
      </div>

    </div>

    <!-- ── RIGHT: Contact Form ── -->
    <div class="contact-form-card">
      <h3 class="form-title">Send a Message</h3>

      <div class="form-group form-row">
        <input type="text" class="form-input" placeholder="Your Name" />
        <input type="email" class="form-input" placeholder="Your Email" />
      </div>

      <div class="form-group">
        <input type="text" class="form-input" placeholder="Subject" />
      </div>

      <div class="form-group">
        <textarea class="form-input form-textarea" placeholder="Your Message"></textarea>
      </div>

      <button class="form-submit" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Send Message
      </button>
    </div>

  </div>

</section>
